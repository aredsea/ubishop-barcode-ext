<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root { --bg:#fff; --fg:#1b1b1b; --sub:#6b7280; --line:#e5e7eb; --on:#35C5F0; --soft:#f7f9fc; }
  * { box-sizing:border-box; font-family:'Pretendard','Malgun Gothic',sans-serif; }
  body { width:288px; margin:0; padding:14px; color:var(--fg); background:var(--bg); }
  .hd { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .hd img { width:24px; height:24px; }
  .hd .t { font-size:13px; font-weight:700; }
  .hd .v { font-size:11px; color:var(--sub); margin-left:auto; }
  .row { display:flex; align-items:center; gap:10px; padding:10px 0; }
  .row .label { display:flex; flex-direction:column; min-width:0; flex:1; }
  .row .label .name { font-size:12.5px; font-weight:600; }
  .row .label .desc { font-size:11px; color:var(--sub); margin-top:2px; line-height:1.35; }
  .master { border-top:1px solid var(--line); }
  .sub { margin-left:6px; padding-left:12px; border-left:2px solid var(--line); }
  .sub.hidden { display:none; }
  .sub .row { padding:7px 0; }
  .sub .row .name { font-weight:500; font-size:12px; }
  .group-t { font-size:10px; font-weight:700; letter-spacing:.04em; color:var(--sub);
             text-transform:uppercase; padding:8px 0 2px 0; }
  .sw { margin-left:auto; position:relative; width:42px; height:24px; flex:none; }
  .sw input { opacity:0; width:0; height:0; }
  .track { position:absolute; inset:0; background:#cbd5e1; border-radius:999px; transition:.18s; cursor:pointer; }
  .track::before { content:''; position:absolute; left:3px; top:3px; width:18px; height:18px;
                   background:#fff; border-radius:50%; transition:.18s; box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .sw input:checked + .track { background:var(--on); }
  .sw input:checked + .track::before { transform:translateX(18px); }
  .sw input:disabled + .track { opacity:.45; cursor:default; }
  .foot { margin-top:10px; padding:8px 10px; font-size:10.5px; color:var(--sub);
          line-height:1.5; background:var(--soft); border-radius:8px; }
  .badge { display:inline-block; padding:1px 6px; font-size:9.5px; font-weight:700;
           color:#0f8fb8; background:#e0f4fc; border-radius:999px; margin-left:6px; }
</style>
</head>
<body>
  <div class="hd">
    <img src="../icons/icon48.png" alt="">
    <span class="t">유비샵 도구</span>
    <span class="v" id="ver"></span>
  </div>

  <div class="row master">
    <div class="label">
      <span class="name">유비샵 스킨모드</span>
      <span class="desc">아래 세부 기능을 켜고 끌 수 있어요</span>
    </div>
    <label class="sw"><input type="checkbox" id="skin"><span class="track"></span></label>
  </div>

  <div class="sub hidden" id="sub">
    <div class="group-t">디자인</div>
    <div class="row">
      <div class="label"><span class="name">다크 테마</span><span class="desc">실제 다크 색상 적용</span></div>
      <label class="sw"><input type="checkbox" id="dark"><span class="track"></span></label>
    </div>

    <div class="group-t">생산성</div>
    <div class="row">
      <div class="label"><span class="name">좌측 사이드바</span><span class="desc">날짜 빠른선택 등</span></div>
      <label class="sw"><input type="checkbox" id="sidebar"><span class="track"></span></label>
    </div>
    <div class="row">
      <div class="label"><span class="name">리스트 기본 100</span><span class="desc">100/300/500 옵션 추가</span></div>
      <label class="sw"><input type="checkbox" id="pageSize"><span class="track"></span></label>
    </div>
    <div class="row">
      <div class="label"><span class="name">썸네일 → 수정 새 창</span><span class="desc">기초상품관리 이미지보기</span></div>
      <label class="sw"><input type="checkbox" id="thumb"><span class="track"></span></label>
    </div>

    <div class="group-t">실험적</div>
    <div class="row">
      <div class="label">
        <span class="name">전표 자동 캐시</span>
        <span class="desc">출고/매출 전표를 C드라이브에 누적, 사이드바에서 시작</span>
      </div>
      <label class="sw"><input type="checkbox" id="autoSync"><span class="track"></span></label>
    </div>
  </div>

  <div class="foot">변경 후 유비샵 페이지를 새로고침하면 확실히 반영됩니다.</div>

  <script src="popup.js"></script>
</body>
</html>
