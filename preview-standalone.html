<script>
/* =============================================================================
 *  config.js — 모든 설정 외부화 (기획서 8절 [CFG])
 *  값만 바꾸면 출력이 바뀐다. 코드 수정 불필요.
 *  MAIN world 전역 네임스페이스(window.UBCFG)로 다른 모듈에 공유된다.
 *
 *  ※ 라벨 항목 위치는 코드가 아니라 "편집기"에서 드래그/수치로 조정하고 저장한다.
 *    저장값은 localStorage(키: storageKey)에 들어가며, 아래 layout 은 "기본값"이다.
 * ========================================================================== */
(function () {
  'use strict';

  window.UBCFG = {
    /* --- 디버그 ----------------------------------------------------------- */
    // true 면 콘솔에 상세 로그를 찍고, 출처 A 응답 HTML을 window.__UB_LAST_BARPRINT_HTML
    // 에 보관한다(파서 확정용). 운영 배포 시 false 권장.
    debug: true,

    /* --- 데이터 소싱 모드 -------------------------------------------------- */
    // 'auto'        : 출처 A(infoItemBarPrint.do) 시도 → 실패/부족 시 출처 B(목록) 폴백 (권장)
    // 'barPrintOnly': 출처 A만 사용
    // 'listOnly'    : 출처 B(목록 스크래핑)만 사용 (프로토타입에서 검증된 경로)
    sourceMode: 'auto',

    // 출처 A 응답에서 라벨 1건당 최소 이 개수 이상 핵심 필드가 차야 "성공"으로 본다.
    barPrintMinFields: 1,

    /* --- 인쇄 페이지 엔드포인트 (현행 동작 분석 결과) --------------------- */
    barPrint: {
      path: '/info/item/infoItemBarPrint.do',
      tcode: 'info_item'
    },

    /* --- 목록 표 셀(열) 매핑 — 0-base. 분석으로 확정된 값 (기획서 3절) ----- */
    cell: {
      idx: 1, vendor: 2, itemNum: 4, gubun: 5, storeInfo: 6, price: 12, status: 15
    },

    /* --- 출처 A: infoItemBarPrint.do 응답 파싱 매핑 (실측 확정 2026-06) ----
     *  응답은 table.t_list(마지막) + div.tooltip2#note_N(상품명) 으로 구성.
     *  검색결과 전체가 오므로 체크한 바코드로 필터한다. 인코딩 UTF-8.
     *  행별 셀:
     *   1=idx체크박스(바코드), 4=바코드+상품번호, 5=구분, 6=구분/거래처/금속/중량/호수,
     *   12=판매가.  상품명(한글)=note_N 툴팁의 "상품명 : … 해리/배수".          */
    barPrintCell: { itemNo: 4, gubun: 5, info: 6, price: 12 },

    /* --- 라벨 물리 규격 (Zebra GX430t 300dpi) — 확정: 가로 60 × 세로 10 mm -- */
    label: { wmm: 60, hmm: 10 },

    /* --- 편집기 --------------------------------------------------------- */
    editor: {
      pxmm: 13,      // 편집 캔버스 확대율(화면 px/mm). 60mm→780px, 10mm→130px
      grid: 0.5,     // 스냅/넛지 기본 격자(mm). 화살표키 0.5mm, Shift+화살표 0.1mm
      showDividers: true,
      dividers: [22, 42]  // 3분할 안내선 위치(mm). 인쇄에는 점선으로 안 나옴(가이드)
    },

    /* --- localStorage 저장 키 (레이아웃 위치 저장) ----------------------- */
    storageKey: 'UB_LABEL_LAYOUT_v1',

    /* --- 바코드 ----------------------------------------------------------- */
    barcode: {
      format: 'CODE128',  // 미확정(기획서 6절). 스캐너 디코드로 확정 후 변경.
      width: 1.4,
      displayValue: false
    },

    /* --- 인쇄 동작 -------------------------------------------------------- */
    print: {
      // false(기본): 바코드인쇄 → 곧바로 인쇄(미리보기 모달 없음).
      //   크롬 인쇄창까지 없애려면 크롬을 --kiosk-printing 플래그로 실행해야 한다.
      //   (동봉 "유비샵-인쇄모드.bat" 참고. Zebra 를 기본 프린터로 지정.)
      // true: 인쇄 전에 미리보기/위치편집 모달을 먼저 띄움.
      previewBeforePrint: false,
      fontFamily: "'Pretendard', '돋움', Dotum, sans-serif",
      waitFontsMs: 400   // 인쇄 직전 폰트 로드 대기(ms). 0이면 fonts.ready 만 사용.
    },

    /* --- 위치 설정 버튼(페이지에 떠 있는 작은 버튼) ----------------------- */
    settingsButton: { show: true, text: '🏷 라벨위치', bottom: 12, right: 12 },

    /* --- 표시 토글(전역) -------------------------------------------------- */
    show: { panelDividerLine: true },

    /* --- 고정 텍스트 ------------------------------------------------------ */
    fixed: {
      company: '(주)D102',
      brandTop: '주얼리전산의 리더 지앤샵',
      brandUrl: 'www.honsu114.com'
    },

    /* --- 바코드 하단 접두 ------------------------------------------------- */
    barcodePrefix: 'LT',

    /* =======================================================================
     *  라벨 레이아웃 기본값 — 60×10mm 캔버스 위 절대좌표(mm)

    layout: [

      { key: 'company',      name: '회사/매장',     type: 'text',    x: 0.6,  y: 0.2, w: 20,   fs: 1.9, bold: false, align: 'left',   visible: true },
      { key: 'itemName',     name: '품명',          type: 'text',    x: 0.6,  y: 2.0, w: 20,   fs: 1.9, bold: false, align: 'left',   visible: true },
      { key: 'price',        name: '판매가',        type: 'text',    x: 0.6,  y: 3.8, w: 20,   fs: 2.6, bold: true,  align: 'left',   visible: true },
      { key: 'barcode',      name: '바코드',        type: 'barcode', x: 0.6,  y: 5.9, w: 20,   h: 2.9,  bold: false, align: 'left',   visible: true },
      { key: 'barcodeLabel', name: '바코드+접두',   type: 'text',    x: 0.6,  y: 9.0, w: 20,   fs: 2.0, bold: false, align: 'left',   visible: true },

      // ── 패널 B (제품정보면) ──
      { key: 'bnum2',        name: '바코드번호(B)', type: 'text',    x: 22.6, y: 0.4, w: 18.5, fs: 2.1, bold: false, align: 'left',   visible: true },
      { key: 'metal',        name: '금속/외경',     type: 'text',    x: 22.6, y: 2.4, w: 18.5, fs: 1.9, bold: false, align: 'left',   visible: true },
      { key: 'weight',       name: '중량',          type: 'text',    x: 22.6, y: 4.3, w: 18.5, fs: 1.9, bold: false, align: 'left',   visible: true },

      { key: 'namePartner',  name: '품명+거래처',   type: 'text',    x: 22.6, y: 8.1, w: 18.5, fs: 1.8, bold: false, align: 'left',   visible: true },

<script>
/* =============================================================================
 *  overlay.js — 인쇄 로딩 오버레이 (CSS 애니메이션)
 *  바코드인쇄 클릭 시 전체화면 반투명 + 스피너. window.UBOverlay.show/hide.
 * ========================================================================== */
(function () {
  'use strict';
  var ID = 'ub-print-overlay';

  function ensureStyle() {
    if (document.getElementById('ub-ov-style')) return;
    var css =
      '#' + ID + '{position:fixed;inset:0;z-index:2147483640;display:flex;' +
      'align-items:center;justify-content:center;background:rgba(17,24,39,.55);}' +
      '#' + ID + ' .ub-ov-box{display:flex;flex-direction:column;align-items:center;gap:16px;' +
      'color:#fff;font:600 15px "Malgun Gothic",sans-serif;}' +
      // 사용자 지정 CSS 로더
      '#' + ID + ' .loader{width:50px;padding:8px;aspect-ratio:1;border-radius:50%;' +
      'background:#25b09b;' +
      '--_m:conic-gradient(#0000 10%,#000),linear-gradient(#000 0 0) content-box;' +
      '-webkit-mask:var(--_m);mask:var(--_m);' +
      '-webkit-mask-composite:source-out;mask-composite:subtract;' +
      'animation:ub-l3 1s infinite linear;}' +
      '@keyframes ub-l3{to{transform:rotate(1turn)}}';
    var s = document.createElement('style');
    s.id = 'ub-ov-style';
    s.textContent = css;
    (document.head || document.documentElement).appendChild(s);
  }

  function show(msg) {
    ensureStyle();
    hide();
    var o = document.createElement('div');
    o.id = ID;
    o.innerHTML = '<div class="ub-ov-box"><div class="loader"></div><div>' +
      (msg || '인쇄 준비 중…') + '</div></div>';
    (document.body || document.documentElement).appendChild(o);
  }
  function hide() {
    var o = document.getElementById(ID);
    if (o) o.remove();
  }

  window.UBOverlay = { show: show, hide: hide };
})();

</script>

<script>
/* =============================================================================
 *  barcode.js — JsBarcode 래퍼 (기획서 8절 [UI] 바코드 렌더)
 *  바코드값 → SVG 문자열. 라벨의 바코드 박스에 맞춰 100% 채워진다.
 *  window.UBBarcode.svg(code, opts) 로 노출. (opts 는 비율 계산용; CSS가 박스에 맞춤)
 * ========================================================================== */
(function () {
  'use strict';

  function svg(code, opts) {
    const C = window.UBCFG.barcode;
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    try {
      // 막대 비율만 결정(픽셀). 실제 표시 크기는 라벨 CSS(width/height:100%)가 박스에 맞춤.
      JsBarcode(el, String(code || ''), {
        format: C.format,
        displayValue: C.displayValue,
        margin: 0,
        width: C.width,
        height: 48
      });
      // viewBox 기반 자동 스케일을 위해 고정 width/height 속성 제거(없으면 추가 안 함)
      el.removeAttribute('width');
      el.removeAttribute('height');
      el.setAttribute('preserveAspectRatio', 'none');
    } catch (e) {
      console.error('[UB] barcode render error:', code, e);
    }
    return el.outerHTML;
  }

  window.UBBarcode = { svg };
})();

</script>

<script>
/* =============================================================================
 *  label.js — 좌표(mm) 기반 라벨 렌더 (기획서 5·8절 [UI])
 *  레이아웃(config.layout + localStorage 저장값)으로 각 항목을 절대배치한다.
 *  같은 렌더 함수를 ① 편집기 미리보기, ② 실제 인쇄가 공유한다(양식 드리프트 방지).
 *
 *  단위:
 *    - 인쇄:  unit='mm'  → 실제 60×10mm
 *    - 편집기: pxmm 지정 → 화면 px (확대 미리보기)
 * ========================================================================== */
(function () {
  'use strict';

  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const won = (n) => (n == null || n === '') ? '' : Number(n).toLocaleString('ko-KR');

  /* ---- 저장소: localStorage 단일 소스(유비샵 origin) ----------------------
   *  콘텐츠(인쇄 페이지)는 MAIN world 라 chrome.storage 접근 불가.
   *  편집기 저장과 인쇄 읽기를 같은 localStorage 로 통일 → 항상 동기·일치.
   *  (chrome.storage/bridge/옵션페이지 의존 제거 → 재설치 없이 확실히 반영)
   *  옵션페이지(확장 origin)는 origin 이 달라 이 값을 직접 못 본다 → 위치 설정은
   *  반드시 유비샵 페이지의 "🏷 라벨위치" 버튼(또는 최초실행 편집기)에서 한다.
   * ----------------------------------------------------------------------- */
  function readSaved() {
    try { const r = localStorage.getItem(window.UBCFG.storageKey); return r ? JSON.parse(r) : null; }
    catch (e) { return null; }
  }
  function writeSaved(slim) {
    try { localStorage.setItem(window.UBCFG.storageKey, JSON.stringify(slim)); return true; }
    catch (e) { console.error('[UB] 위치 저장 실패:', e); return false; }
  }
  function slimLayout(layout) {
    return layout.map(f => ({
      key: f.key, x: f.x, y: f.y, w: f.w, h: f.h,
      fs: f.fs, bold: f.bold, align: f.align, visible: f.visible
    }));
  }

  function savedLayout() { return readSaved(); }                 // 동기. 없으면 null
  function isConfigured() {
    const s = savedLayout();
    return Array.isArray(s) && s.length > 0;
  }

  function getLayout() {
    const CFG = window.UBCFG;
    const base = CFG.layout.map(f => ({ ...f }));
    const saved = readSaved();
    if (saved && Array.isArray(saved)) {
      const byKey = {};
      saved.forEach(s => { if (s && s.key) byKey[s.key] = s; });
      base.forEach(f => {
        const s = byKey[f.key];
        if (!s) return;
        ['x', 'y', 'w', 'h', 'fs', 'bold', 'align', 'visible'].forEach(k => {
          if (s[k] !== undefined) f[k] = s[k];
        });
      });
    }
    return base;
  }

  function saveLayout(layout) { return writeSaved(slimLayout(layout)); }

  function resetLayout() {
    try { localStorage.removeItem(window.UBCFG.storageKey); } catch (e) {}
  }

  /* ---- 데이터키 → 표시 문자열 매핑 ------------------------------------- */
  function fieldValue(key, d) {
    switch (key) {
      case 'company':      return esc(d.company);
      case 'itemName':     return esc(d.itemName);
      case 'price':        return won(d.price);
      case 'barcodeLabel': return d.barcodePrefix
                                  ? esc(d.barcodePrefix) + '&nbsp;&nbsp;' + esc(d.barcode)
                                  : esc(d.barcode);
      case 'bnum2':        return esc(d.barcode);
      case 'metal':        return esc([d.metal, d.diameter ? `(${d.diameter})` : ''].filter(Boolean).join(' '));
      case 'weight':       return esc(d.weight);
      case 'compCat':      return esc([d.company, d.category].filter(Boolean).join('  '));
      case 'namePartner':  return esc([d.itemName, [d.partner, d.setNo].filter(Boolean).join('')].filter(Boolean).join(''));
      case 'brandTop':     return esc(d.brandTop);
      case 'brandUrl':     return esc(d.brandUrl);
      default:             return '';
    }
  }

  // 단위 변환기: mm 모드 vs pxmm 모드
  function makeU(opts) {
    const pxmm = opts && opts.pxmm;
    return (v) => pxmm ? (v * pxmm) + 'px' : v + 'mm';
  }

  /* ---- 라벨 1장 렌더 ---------------------------------------------------- *
   *  opts: { pxmm?, layout?, editable? }  editable=true 면 드래그용 data-key 부여
   * --------------------------------------------------------------------- */
  function buildLabel(d, opts) {
    opts = opts || {};
    const CFG = window.UBCFG;
    const layout = opts.layout || getLayout();
    const u = makeU(opts);

    let inner = '';

    // 3분할 안내 구분선(인쇄 시 옅게)
    if (CFG.show.panelDividerLine && CFG.editor.showDividers) {
      CFG.editor.dividers.forEach(x => {
        inner += `<div class="ub-div" style="left:${u(x)}"></div>`;
      });
    }

    layout.forEach(f => {
      if (f.visible === false) return;
      const pos = `left:${u(f.x)};top:${u(f.y)};width:${u(f.w)};`;
      const dk = opts.editable ? ` data-key="${f.key}"` : '';

      if (f.type === 'barcode') {
        const h = f.h || 2.9;
        inner += `<div class="ub-f ub-bc"${dk} style="${pos}height:${u(h)}">`
               + window.UBBarcode.svg(d.barcode, { widthMm: f.w, heightMm: h, pxmm: opts.pxmm })
               + `</div>`;
      } else if (f.type === 'box') {
        const h = f.h || 3;
        inner += `<div class="ub-f ub-box"${dk} style="${pos}height:${u(h)}"></div>`;
      } else {
        const style = pos
          + `font-size:${u(f.fs)};`
          + `text-align:${f.align || 'left'};`
          + (f.bold ? 'font-weight:bold;' : '');
        inner += `<div class="ub-f ub-text"${dk} style="${style}">${fieldValue(f.key, d)}</div>`;
      }
    });

    const w = u(CFG.label.wmm), h = u(CFG.label.hmm);
    return `<div class="ub-label" style="width:${w};height:${h}">${inner}</div>`;
  }

  /* ---- Pretendard @font-face (오프라인 base64 임베드) ------------------- */
  function fontFaceCss() {
    const F = window.UB_FONT;
    if (!F) return '';
    return `
      @font-face{font-family:'Pretendard';font-style:normal;font-weight:400;
        src:url(${F.regular}) format('woff2');font-display:swap;}
      @font-face{font-family:'Pretendard';font-style:normal;font-weight:700;
        src:url(${F.bold}) format('woff2');font-display:swap;}
    `;
  }

  /* ---- 공통 CSS -------------------------------------------------------- */
  function baseCss(opts) {
    opts = opts || {};
    const CFG = window.UBCFG;
    const u = makeU(opts);
    const ff = (CFG.print && CFG.print.fontFamily) || '"돋움", Dotum, sans-serif';
    return fontFaceCss() + `
      .ub-label { position: relative; overflow: hidden; box-sizing: border-box;
                  background: #fff; color: #000;
                  font-family: ${ff}; }
      .ub-f { position: absolute; box-sizing: border-box; line-height: 1.0;
              white-space: nowrap; overflow: hidden; }
      .ub-text { text-overflow: ellipsis; }
      .ub-bc svg { width: 100%; height: 100%; display: block; }
      .ub-box { border: ${u(0.15)} solid #999; }
      .ub-div { position: absolute; top: 0; bottom: 0; width: 0;
                border-left: ${u(0.12)} dashed #bbb; }
    `;
  }

  /* ---- 인쇄용 전체 문서 (라벨당 1페이지) ------------------------------- */
  function buildDocument(dataArr, layoutOverride) {
    const CFG = window.UBCFG;
    const layout = layoutOverride || getLayout();
    const W = CFG.label.wmm, H = CFG.label.hmm;
    const css = `
      @page { size: ${W}mm ${H}mm; margin: 0; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      ${baseCss({})}
      .ub-page { width: ${W}mm; height: ${H}mm; page-break-after: always; }
      /* 인쇄 시 안내선은 숨김(라벨에 점선 인쇄 방지) */
      @media print { .ub-div { display: none; } }
    `;
    const body = dataArr.map(d =>
      `<div class="ub-page">${buildLabel(d, { layout })}</div>`
    ).join('');
    return `<!doctype html><html><head><meta charset="utf-8"><title>바코드 라벨 인쇄</title>`
         + `<style>${css}</style></head><body>${body}</body></html>`;
  }

  window.UBLabel = {
    getLayout, saveLayout, resetLayout, fieldValue,
    buildLabel, baseCss, buildDocument,
    isConfigured, savedLayout
  };
})();

</script>

<script>
/* =============================================================================
 *  print.js — 숨은 iframe 인쇄 (기획서 8절 [PRINT])
 *  팝업 차단을 피하려고 새 창 대신 숨은 iframe 에 문서를 써서 인쇄한다.
 *  라벨당 1페이지(@page + page-break-after:always 는 label.js CSS 에서 처리).
 * ========================================================================== */
(function () {
  'use strict';

  const FRAME_ID = '__ubBarFrame';

  function printDocument(html) {
    const old = document.getElementById(FRAME_ID);
    if (old) old.remove();

    const frame = document.createElement('iframe');
    frame.id = FRAME_ID;
    frame.setAttribute('aria-hidden', 'true');
    frame.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;';
    document.body.appendChild(frame);

    const fdoc = frame.contentWindow.document;
    fdoc.open();
    fdoc.write(html);
    fdoc.close();

    if (window.UBOverlay) window.UBOverlay.show('인쇄 중…');

    // SVG 바코드 렌더 + Pretendard 폰트 로드가 끝난 뒤 인쇄 트리거.
    const cfgWait = (window.UBCFG && window.UBCFG.print && window.UBCFG.print.waitFontsMs) || 200;
    const fire = () => {
      const fdocReady = frame.contentWindow.document;
      const go = () => {
        try {
          frame.contentWindow.focus();
          frame.contentWindow.print();   // --kiosk-printing 이면 다이얼로그 없이 즉시 인쇄
        } catch (e) {
          console.error('[UB] print 실패:', e);
        } finally {
          // 인쇄창(또는 무다이얼로그 인쇄) 처리 후 오버레이 제거
          if (window.UBOverlay) setTimeout(() => window.UBOverlay.hide(), 600);
        }
      };
      // 폰트 로딩 완료를 기다린다(Pretendard 첫 인쇄 누락 방지)
      if (fdocReady.fonts && fdocReady.fonts.ready) {
        Promise.race([
          fdocReady.fonts.ready,
          new Promise(r => setTimeout(r, 1500))   // 최대 대기 안전장치
        ]).then(() => setTimeout(go, cfgWait));
      } else {
        setTimeout(go, cfgWait);
      }
    };
    if (frame.contentWindow.document.readyState === 'complete') {
      setTimeout(fire, 50);
    } else {
      frame.addEventListener('load', () => setTimeout(fire, 50), { once: true });
    }
  }

  window.UBPrint = { printDocument };
})();

</script>

<script>
/* =============================================================================

 *  요구사항:
 *   - 바코드인쇄 → 곧바로 크롬 인쇄창이 뜨지 않는다. 먼저 "우리 미리보기" 모달.
 *   - 각 항목을 드래그 또는 수치(mm)로 정밀 위치 조정 → 저장(localStorage).

      .ub-ed-props{width:250px;background:#fff;border-left:1px solid #d1d5db;
             padding:12px;overflow:auto;font-size:12.5px;}
      .ub-ed-props h3{margin:0 0 8px;font-size:13px;}
      .ub-ed-row{display:flex;align-items:center;gap:6px;margin:6px 0;}
      .ub-ed-row label{width:62px;color:#555;}
      .ub-ed-row input[type=number]{width:70px;padding:3px 5px;border:1px solid #cbd5e1;border-radius:4px;}
      .ub-ed-row select{padding:3px;border:1px solid #cbd5e1;border-radius:4px;}
      .ub-ed-fieldlist{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
      .ub-ed-chip{padding:3px 7px;border:1px solid #cbd5e1;border-radius:11px;
             background:#f8fafc;cursor:pointer;font-size:11.5px;}
      .ub-ed-chip.sel{background:#2563eb;color:#fff;border-color:#2563eb;}
      .ub-ed-chip.off{opacity:.45;text-decoration:line-through;}
      .ub-ed-foot{padding:8px 14px;background:#e5e7eb;font-size:11.5px;color:#555;}
      .ub-ed-hint{color:#94a3b8;font-size:11px;margin-top:4px;}
      .ub-ed-banner{padding:9px 14px;background:#fffbeb;color:#92400e;font-size:13px;
            border-bottom:1px solid #fde68a;font-weight:600;}
    `;
    const st = document.createElement('style');
    st.id = 'ub-ed-style';
    st.textContent = css + '\n' + window.UBLabel.baseCss({ pxmm: window.UBCFG.editor.pxmm });
    document.head.appendChild(st);
  }

  /* ---- 모달 골격 ------------------------------------------------------- */
  function buildShell() {
    const root = document.createElement('div');
    root.id = ID;
    root.innerHTML = `
      <div class="ub-ed-modal">
        <div class="ub-ed-head">
          <h2>바코드 라벨 미리보기</h2>
          <div class="ub-ed-pager">
            <button class="ub-ed-btn ghost" data-act="prev">◀</button>
            <span data-el="page">1 / 1</span>
            <button class="ub-ed-btn ghost" data-act="next">▶</button>
          </div>
          <div class="sp"></div>
          <button class="ub-ed-btn ghost" data-act="edit">✎ 위치 편집</button>
          <button class="ub-ed-btn ghost" data-act="save">저장</button>
          <button class="ub-ed-btn warn" data-act="reset">기본값</button>
          <button class="ub-ed-btn primary" data-act="print">🖨 인쇄</button>
          <button class="ub-ed-btn ghost" data-act="close">✕</button>
        </div>
        <div class="ub-ed-banner" data-el="banner" style="display:none"></div>
        <div class="ub-ed-body">
          <div class="ub-ed-canvaswrap">
            <div class="ub-ed-canvas" data-el="canvas"></div>
          </div>
          <div class="ub-ed-props" data-el="props" style="display:none"></div>
        </div>
        <div class="ub-ed-foot" data-el="foot">미리보기입니다. 위치를 바꾸려면 "위치 편집"을 켜고 항목을 드래그하거나 수치를 입력한 뒤 "저장"하세요.</div>
      </div>`;
    return root;
  }

  /* ---- 렌더 ------------------------------------------------------------ */
  function render() {
    const CFG = window.UBCFG;
    const pxmm = CFG.editor.pxmm;
    const canvas = state.root.querySelector('[data-el=canvas]');
    const d = state.data[state.idx];

    canvas.className = 'ub-ed-canvas' + (state.editMode ? ' edit' : '');
    canvas.innerHTML = window.UBLabel.buildLabel(d, {
      pxmm, layout: state.layout, editable: state.editMode
    });
    // buildLabel 은 .ub-label 래퍼를 만든다 → 캔버스 크기를 라벨에 맞춤
    const lbl = canvas.querySelector('.ub-label');
    if (lbl) { lbl.style.position = 'static'; }
    canvas.style.width = (CFG.label.wmm * pxmm) + 'px';
    canvas.style.height = (CFG.label.hmm * pxmm) + 'px';

    // 선택 표시 + 리사이즈 핸들 + 드래그 바인딩
    if (state.editMode) {
      if (state.selKey) {
        const sel = canvas.querySelector(`[data-key="${state.selKey}"]`);
        if (sel) { sel.classList.add('sel'); addHandle(canvas, sel); }
      }
      bindDrag(canvas);
    }

    state.root.querySelector('[data-el=page]').textContent =
      (state.idx + 1) + ' / ' + state.data.length;
    state.root.querySelector('[data-act=edit]').classList.toggle('on', state.editMode);
    state.root.querySelector('[data-el=props]').style.display = state.editMode ? 'block' : 'none';
    if (state.editMode) renderProps();
  }

  function field(key) { return state.layout.find(f => f.key === key); }

  function renderProps() {
    const props = state.root.querySelector('[data-el=props]');
    const chips = state.layout.map(f =>
      `<span class="ub-ed-chip ${f.key === state.selKey ? 'sel' : ''} ${f.visible === false ? 'off' : ''}" data-chip="${f.key}">${f.name}</span>`
    ).join('');

    let body = '';
    const f = field(state.selKey);
    if (f) {
      const numRow = (lab, prop, step) =>
        `<div class="ub-ed-row"><label>${lab}</label>
           <input type="number" step="${step}" data-prop="${prop}" value="${f[prop] != null ? f[prop] : ''}"> mm</div>`;
      body += `<h3>${f.name} <span style="color:#94a3b8">(${f.key})</span></h3>`;
      body += numRow('X (가로)', 'x', 0.1);
      body += numRow('Y (세로)', 'y', 0.1);
      body += numRow('너비 W', 'w', 0.1);
      if (f.type === 'barcode' || f.type === 'box') body += numRow('높이 H', 'h', 0.1);
      if (f.type === 'text') {
        body += numRow('글자크기', 'fs', 0.1);
        body += `<div class="ub-ed-row"><label>정렬</label>
          <select data-prop="align">
            <option value="left"${f.align === 'left' ? ' selected' : ''}>왼쪽</option>
            <option value="center"${f.align === 'center' ? ' selected' : ''}>가운데</option>
            <option value="right"${f.align === 'right' ? ' selected' : ''}>오른쪽</option>
          </select></div>`;
        body += `<div class="ub-ed-row"><label>굵게</label>
          <input type="checkbox" data-prop="bold"${f.bold ? ' checked' : ''}></div>`;
      }
      body += `<div class="ub-ed-row"><label>표시</label>
        <input type="checkbox" data-prop="visible"${f.visible !== false ? ' checked' : ''}></div>`;
      body += `<div class="ub-ed-hint">드래그로 이동 · 선택 후 ←↑↓→ 0.5mm 이동 (Shift=0.1mm)</div>`;
    } else {
      body = `<div class="ub-ed-hint">아래에서 항목을 클릭하거나, 캔버스에서 항목을 클릭해 선택하세요.</div>`;
    }

    props.innerHTML = `<div class="ub-ed-fieldlist">${chips}</div>${body}`;

    // 칩 클릭 → 선택
    props.querySelectorAll('[data-chip]').forEach(ch => {
      ch.addEventListener('click', () => { state.selKey = ch.dataset.chip; render(); });
    });
    // 수치 입력 → 반영
    props.querySelectorAll('[data-prop]').forEach(inp => {
      const ev = inp.type === 'checkbox' || inp.tagName === 'SELECT' ? 'change' : 'input';
      inp.addEventListener(ev, () => {
        const f2 = field(state.selKey); if (!f2) return;
        const p = inp.dataset.prop;
        if (inp.type === 'checkbox') f2[p] = inp.checked;
        else if (inp.tagName === 'SELECT') f2[p] = inp.value;
        else f2[p] = parseFloat(inp.value);
        render();
        // 입력 포커스 유지: 다시 같은 입력으로
        const again = state.root.querySelector(`[data-el=props] [data-prop="${p}"]`);
        if (again && ev === 'input') { again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
      });
    });
  }

  /* ---- 리사이즈 핸들 배치(선택 필드 우하단) -------------------------- */
  function addHandle(canvas, sel) {
    const old = canvas.querySelector('.ub-rz'); if (old) old.remove();
    const h = document.createElement('div');
    h.className = 'ub-rz';
    h.style.left = (sel.offsetLeft + sel.offsetWidth - 7) + 'px';
    h.style.top = (sel.offsetTop + sel.offsetHeight - 7) + 'px';
    canvas.appendChild(h);
    return h;
  }
  function moveHandle(canvas, sel) {
    const h = canvas.querySelector('.ub-rz'); if (!h) return;
    h.style.left = (sel.offsetLeft + sel.offsetWidth - 7) + 'px';
    h.style.top = (sel.offsetTop + sel.offsetHeight - 7) + 'px';
  }

  /* ---- 드래그(이동) + 리사이즈(대각선) ------------------------------- */
  function bindDrag(canvas) {
    canvas.onmousedown = (e) => {
      const pxmm = window.UBCFG.editor.pxmm;

      // 1) 리사이즈 핸들 → 대각선 크기 조절
      if (e.target.classList.contains('ub-rz')) {
        e.preventDefault();
        const f = field(state.selKey); if (!f) return;
        const sel = canvas.querySelector(`[data-key="${state.selKey}"]`);
        const isBox = (f.type === 'barcode' || f.type === 'box');
        const sx = e.clientX, sy = e.clientY;
        const ow = f.w, oh = (f.h != null ? f.h : 3), ofs = (f.fs != null ? f.fs : 2);
        const rzMove = (ev) => {
          const dx = (ev.clientX - sx) / pxmm;
          const dy = (ev.clientY - sy) / pxmm;
          f.w = clamp(round1(ow + dx), 2, window.UBCFG.label.wmm);
          if (isBox) f.h = clamp(round1(oh + dy), 1, window.UBCFG.label.hmm);
          else f.fs = clamp(round1(ofs + dy), 0.8, 9);
          if (sel) {
            sel.style.width = (f.w * pxmm) + 'px';
            if (isBox) sel.style.height = (f.h * pxmm) + 'px';
            else sel.style.fontSize = (f.fs * pxmm) + 'px';
            moveHandle(canvas, sel);
          }
          syncNum('w', f.w); if (isBox) syncNum('h', f.h); else syncNum('fs', f.fs);
        };
        const rzUp = () => {
          document.removeEventListener('mousemove', rzMove);
          document.removeEventListener('mouseup', rzUp);
          render();   // 최종 동기화(바코드 SVG 재맞춤 등)
        };
        document.addEventListener('mousemove', rzMove);
        document.addEventListener('mouseup', rzUp);
        return;
      }

      // 2) 필드 본체 → 이동
      const el = e.target.closest('[data-key]');
      if (!el) return;
      e.preventDefault();
      state.selKey = el.dataset.key;
      const f = field(state.selKey);
      const startX = e.clientX, startY = e.clientY;
      const ox = f.x, oy = f.y;
      canvas.querySelectorAll('.ub-f').forEach(n => n.classList.remove('sel'));
      el.classList.add('sel');
      addHandle(canvas, el);
      renderProps();

      const move = (ev) => {
        const dx = (ev.clientX - startX) / pxmm;
        const dy = (ev.clientY - startY) / pxmm;
        f.x = clamp(round1(ox + dx), 0, window.UBCFG.label.wmm - 1);
        f.y = clamp(round1(oy + dy), 0, window.UBCFG.label.hmm - 0.3);
        el.style.left = (f.x * pxmm) + 'px';
        el.style.top = (f.y * pxmm) + 'px';
        moveHandle(canvas, el);
        syncNum('x', f.x); syncNum('y', f.y);
      };
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    };
  }

  function syncNum(prop, val) {
    const inp = state.root.querySelector(`[data-el=props] [data-prop="${prop}"]`);
    if (inp && document.activeElement !== inp) inp.value = val;
  }

  /* ---- 키보드 넛지 ----------------------------------------------------- */
  function onKey(e) {
    if (!state || !state.editMode || !state.selKey) return;
    const map = { ArrowLeft: ['x', -1], ArrowRight: ['x', 1], ArrowUp: ['y', -1], ArrowDown: ['y', 1] };
    const m = map[e.key]; if (!m) return;
    // 입력칸에 포커스 중이면 기본 동작
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    e.preventDefault();
    const step = e.shiftKey ? 0.1 : window.UBCFG.editor.grid;
    const f = field(state.selKey); if (!f) return;
    const [prop, dir] = m;
    const max = prop === 'x' ? window.UBCFG.label.wmm - 1 : window.UBCFG.label.hmm - 0.3;
    f[prop] = clamp(round1(f[prop] + dir * step), 0, max);
    render();
  }

  /* ---- 버튼 액션 ------------------------------------------------------- */
  function onAct(act) {
    switch (act) {
      case 'prev': state.idx = (state.idx - 1 + state.data.length) % state.data.length; render(); break;
      case 'next': state.idx = (state.idx + 1) % state.data.length; render(); break;
      case 'edit':
        state.editMode = !state.editMode;
        if (state.editMode && !state.selKey) state.selKey = state.layout[0].key;
        render(); break;
      case 'save': {
        const ok = window.UBLabel.saveLayout(state.layout);
        // 저장 확인을 눈에 띄게: 배너로 표시
        const b = state.root.querySelector('[data-el=banner]');
        if (b) {
          b.style.display = 'block';
          if (ok) {
            b.style.background = '#ecfdf5'; b.style.color = '#047857'; b.style.borderColor = '#a7f3d0';
            b.textContent = state.opts && state.opts.firstRun
              ? '✔ 저장 완료! "✕"로 닫고 바코드인쇄 하면 이 위치로 인쇄됩니다.'
              : '✔ 저장 완료 — 이후 인쇄에 이 위치가 적용됩니다.';
          } else {
            b.style.background = '#fef2f2'; b.style.color = '#b91c1c'; b.style.borderColor = '#fecaca';
            b.textContent = '⚠ 저장 실패(localStorage 차단). 시크릿/쿠키 차단 설정을 확인하세요.';
          }
        }
        toast(ok ? '저장됨 — 이후 인쇄에 적용됩니다.' : '저장 실패');
        if (state.opts && state.opts.firstRun) document.addEventListener('keydown', escClose, true);
        break;
      }
      case 'reset':
        if (confirm('라벨 위치를 기본값으로 되돌릴까요? (저장된 위치 삭제)')) {
          window.UBLabel.resetLayout();
          state.layout = window.UBLabel.getLayout();
          render(); toast('기본값으로 초기화됨');
        }
        break;
      case 'print':
        // 화면의 현재(미저장 포함) 레이아웃 그대로 인쇄
        window.UBPrint.printDocument(window.UBLabel.buildDocument(state.data, state.layout));
        break;
      case 'close': close(); break;
    }
  }

  function toast(msg) {
    const foot = state.root.querySelector('[data-el=foot]');
    foot.textContent = '✔ ' + msg;
    foot.style.color = '#047857';
    setTimeout(() => { foot.style.color = ''; }, 2500);
  }

  /* ---- 유틸 ------------------------------------------------------------ */
  const round1 = (v) => Math.round(v * 10) / 10;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  /* ---- 열기/닫기 ------------------------------------------------------- */
  function open(dataArr, opts) {
    if (!dataArr || !dataArr.length) return;
    opts = opts || {};
    ensureStyle();
    close(); // 중복 방지
    const root = buildShell();
    document.body.appendChild(root);
    const firstRun = !!opts.firstRun;
    state = {
      root, data: dataArr, layout: window.UBLabel.getLayout(), idx: 0,
      editMode: firstRun, selKey: firstRun ? window.UBLabel.getLayout()[0].key : null,
      opts: opts
    };

    // 제목/배너
    if (opts.title) root.querySelector('h2').textContent = opts.title;
    if (firstRun || opts.banner) {
      const b = root.querySelector('[data-el=banner]');
      b.style.display = 'block';
      b.textContent = opts.banner ||
        '⚠ 최초 설정: 항목을 드래그/수치로 라벨 위치에 맞춘 뒤 반드시 "저장"을 누르세요. 저장해야 인쇄에 적용됩니다.';
    }
    // 인쇄/페이저 숨김(옵션페이지 등 데이터 없는 곳)
    if (opts.hidePrint) {
      const pb = root.querySelector('[data-act=print]'); if (pb) pb.style.display = 'none';
      const pg = root.querySelector('.ub-ed-pager'); if (pg && dataArr.length <= 1) pg.style.display = 'none';
    }

    root.querySelectorAll('[data-act]').forEach(b =>
      b.addEventListener('click', () => onAct(b.dataset.act)));
    // 최초설정 중에는 바깥/ESC 로 무심코 닫히지 않게(저장 유도)
    if (!firstRun) {
      root.addEventListener('mousedown', (e) => { if (e.target === root) close(); });
      document.addEventListener('keydown', escClose, true);
    }
    document.addEventListener('keydown', onKey, true);
    render();
  }

  function escClose(e) { if (e.key === 'Escape') close(); }

  function close() {
    const old = document.getElementById(ID);
    if (old) old.remove();
    document.removeEventListener('keydown', onKey, true);
    document.removeEventListener('keydown', escClose, true);
    state = null;
  }

  window.UBEditor = { open, close };
})();

</script>
</head><body>
<div class="bar">

  <button id="print" class="sec">인쇄 미리보기</button>
  <span class="note">설치·프린터 없이 레이아웃을 확인합니다. 편집기에서 위치(드래그/화살표)·크기(우하단 파란 핸들 대각선)를 바꾸고 "저장". "인쇄 미리보기"는 크롬 미리보기로 열려 프린터 없이도 배치를 확인(취소하면 됨). ※실제 매장 위치설정은 유비샵 페이지의 🏷 버튼에서 하세요. 폰트는 미설치 환경이라 시스템 글꼴로 대체될 수 있습니다.</span>
</div>

<script>

    {company:'(주)D102',itemName:'F-클라라N',itemNo:'F-N5-Q-PB-QB-0084',price:1450000,barcode:'2606KF',barcodePrefix:P,metal:'14K',diameter:'',weight:'4.68g',category:'FASHION',partner:'윤호현5012/쿠',setNo:'',brandTop:F.brandTop,brandUrl:F.brandUrl}
